<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MONEY GAME - Cabbiavoli Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .bg-system { background-color: #0d0d0d; color: #e5e5e5; }
        .card { background-color: #1a1a1a; border: 1px solid #333; }
        .accent { color: #ffd700; } 
        .log-entry { border-left: 3px solid #444; padding-left: 10px; margin-bottom: 6px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #222; border: 1px solid #444; }
    </style>
</head>
<body class="bg-system font-sans p-4 max-w-2xl mx-auto">

    <header class="text-center mb-6">
        <h1 class="text-3xl font-bold accent tracking-widest uppercase italic">The Money Game</h1>
        <p class="text-[10px] opacity-60 uppercase tracking-widest">Cabbiavoli Edition</p>
    </header>

    <section class="card p-4 rounded-xl mb-6 border-blue-900 bg-blue-900/10 shadow-lg">
        <h2 class="text-[11px] font-bold mb-3 text-blue-400 uppercase tracking-widest">👤 Area Personale</h2>
        <div id="login-zone" class="flex flex-col gap-3">
            <select id="user-selector" class="bg-gray-900 border border-gray-700 p-2 rounded text-xs outline-none focus:border-blue-500">
                <option value="">Chi sei?</option>
            </select>
            <input type="password" id="user-pass" placeholder="Password Personale" class="bg-gray-900 border border-gray-700 p-2 rounded text-xs outline-none focus:border-blue-500 text-white">
            <button onclick="loginUser()" class="bg-gray-700 hover:bg-gray-600 py-2 rounded text-[10px] font-bold uppercase transition">Sblocca Profilo</button>
        </div>

        <div id="edit-profile-zone" class="hidden flex flex-col gap-3 border-t border-blue-800 pt-3 text-center">
            <input type="file" id="avatar-file" accept="image/*" class="text-xs text-gray-500">
            <button onclick="updateAvatarFromFile()" class="w-full mt-2 bg-blue-700 hover:bg-blue-600 py-2 rounded text-[10px] font-bold uppercase transition">Aggiorna Profilo</button>
            <div class="bg-black/40 p-3 rounded border border-blue-900/50 text-left mt-2">
                <h3 class="text-[10px] font-bold text-blue-400 uppercase mb-2 tracking-widest text-center">📜 Registra Atto (TDI)</h3>
                <input type="text" id="contract-title" placeholder="Nome Accordo" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-[10px] mb-2">
                <select id="contract-type" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-[10px] mb-2">
                    <option value="Contratto">Contratto Ufficiale</option>
                    <option value="SPA">S.p.A.</option>
                </select>
                <input type="text" id="contract-members" placeholder="Nomi soci" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-[10px] mb-2">
                <button onclick="createOfficialAct()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-2 rounded text-[10px] uppercase">Firma (2 BGC)</button>
            </div>
            <button onclick="logoutUser()" class="text-[9px] text-gray-500 uppercase mt-2 underline">Esci</button>
        </div>
    </section>

    <section class="card p-5 rounded-xl mb-6 border-yellow-900 shadow-2xl">
        <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
            <h2 class="text-xs font-bold text-yellow-500 uppercase tracking-wider">🏛️ Banca Centrale</h2>
            <input id="bank-pass" type="password" placeholder="Password" class="bg-black text-[10px] p-2 border border-gray-800 rounded w-24 text-white">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6 text-center text-xs">
            <div class="p-3 bg-black/50 rounded-lg border border-gray-800">
                <p class="opacity-50 mb-1 font-bold text-[8px]">Massa M0</p>
                <p id="total-m0" class="text-xl font-mono accent">0</p>
            </div>
            <div class="p-3 bg-black/50 rounded-lg border border-green-900">
                <p class="text-green-600 mb-1 font-bold text-[8px]">Bilancio TDI</p>
                <p id="tdi-total" class="text-xl font-mono text-green-400">0</p>
            </div>
        </div>
        <div class="flex flex-col gap-2">
            <select id="admin-player-select" class="bg-gray-900 border border-gray-700 p-2 rounded text-xs text-white"></select>
            <div class="flex gap-2">
                <input id="admin-amount" type="number" placeholder="BGC" class="flex-1 bg-gray-900 border border-gray-700 p-2 rounded text-xs">
                <button onclick="modifyBalance(true)" class="bg-green-600 px-4 py-2 rounded">+</button>
                <button onclick="modifyBalance(false)" class="bg-red-600 px-4 py-2 rounded">-</button>
            </div>
            <button onclick="addTDI()" class="w-full bg-green-700 py-2 rounded text-[10px] font-bold uppercase">+2 BGC TDI</button>
        </div>
    </section>

    <section class="card p-4 rounded-xl mb-6 bg-black/30">
        <h2 class="text-[11px] font-bold mb-3 accent uppercase text-center">📜 Gazzetta Ufficiale</h2>
        <div id="public-log" class="text-[11px] h-48 overflow-y-auto bg-black/60 p-4 rounded-lg border border-gray-800 font-mono"></div>
    </section>

    <section class="card p-4 rounded-xl">
        <h2 class="text-[11px] font-bold mb-4 uppercase text-center italic">Bilancio Cittadini</h2>
        <div id="player-list" class="space-y-3"></div>
    </section>

    <script>
        // --- INIZIALIZZAZIONE GLOBALE ---
        let supabaseClient;
        let players = [];
        let tdiBalance = 0;
        const BANK_PASSWORD = "Giulia122!";

        // Sostituisci con le tue chiavi reali
        const SUPABASE_URL = 'https://onjfboldsdlrovpcaube.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uamZib2xkc2Rscm92cGNhdWJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MDY5NzQsImV4cCI6MjA4ODI4Mjk3NH0.QdQEJRJnCeg4nrxyJulrp4_6a5Tyr97H9INXny17JJ0'; 

        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            window.supabaseClient = supabaseClient; // Forza visibilità globale
        } catch (e) {
            console.error("Errore inizializzazione Supabase:", e);
        }

        async function fetchData() {
            try {
                const { data: pData } = await supabaseClient.from('players').select('*');
                const { data: sData } = await supabaseClient.from('system_data').select('*');
                const { data: lData } = await supabaseClient.from('logs').select('*').order('created_at', { ascending: false });
                const { data: cData } = await supabaseClient.from('contracts').select('*');

                players = pData || [];
                tdiBalance = (sData && sData.length > 0) ? sData[0].tdi_balance : 0;

                updateUI(lData, cData);
            } catch (err) {
                console.error("Errore fetch:", err);
            }
        }

        function updateUI(logs, contracts) {
            const list = document.getElementById('player-list');
            const selector = document.getElementById('user-selector');
            const adminSelector = document.getElementById('admin-player-select');
            const logBox = document.getElementById('public-log');

            // Render Log
            logBox.innerHTML = '';
            logs?.forEach(l => {
                logBox.innerHTML += `<div class="log-entry p-1 mb-1 rounded ${l.style_class}">${l.description}</div>`;
            });

            // Calcolo Massa M0
            let m0 = players.reduce((sum, p) => sum + p.balance, 0);
            document.getElementById('total-m0').innerText = m0;
            document.getElementById('tdi-total').innerText = tdiBalance;

            // Render Players
            const curUser = selector.value;
            list.innerHTML = '';
            selector.innerHTML = '<option value="">Chi sei?</option>';
            adminSelector.innerHTML = '<option value="">Seleziona...</option>';

            players.sort((a,b) => b.balance - a.balance).forEach(p => {
                const userActs = contracts?.filter(c => c.members.includes(p.name)) || [];
                const actsHtml = userActs.map(c => `<span class="text-[7px] bg-blue-900 px-1 mr-1">${c.title}</span>`).join('');

                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-900 p-2 rounded border border-gray-800">
                        <div class="flex items-center gap-2">
                            <img src="${p.avatar || 'https://www.gravatar.com/avatar/0?d=mp'}" class="avatar">
                            <div><p class="text-xs font-bold">${p.name}</p>${actsHtml}</div>
                        </div>
                        <div class="accent font-mono">${p.balance} BGC</div>
                    </div>`;
                
                selector.innerHTML += `<option value="${p.id}" ${p.id == curUser ? 'selected' : ''}>${p.name}</option>`;
                adminSelector.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        }

        async function loginUser() {
            const id = document.getElementById('user-selector').value;
            const pass = document.getElementById('user-pass').value;
            const p = players.find(x => x.id == id);
            if(p && p.pass === pass) {
                document.getElementById('login-zone').classList.add('hidden');
                document.getElementById('edit-profile-zone').classList.remove('hidden');
            } else alert("Password Errata");
        }

        function logoutUser() {
            document.getElementById('login-zone').classList.remove('hidden');
            document.getElementById('edit-profile-zone').classList.add('hidden');
        }

        async function addLogEntry(txt, cls) {
            await supabaseClient.from('logs').insert([{ description: txt, style_class: cls }]);
            fetchData();
        }

        async function modifyBalance(isAdd) {
            if (document.getElementById('bank-pass').value !== BANK_PASSWORD) return alert("No Banca");
            const id = document.getElementById('admin-player-select').value;
            const amt = parseInt(document.getElementById('admin-amount').value);
            const p = players.find(x => x.id == id);
            const newBal = isAdd ? p.balance + amt : Math.max(0, p.balance - amt);
            
            await supabaseClient.from('players').update({ balance: newBal }).eq('id', id);
            addLogEntry(`[BANCA]: ${p.name} ${isAdd ? '+' : '-'}${amt} BGC`, isAdd ? 'text-green-400' : 'text-red-400');
        }

        async function addTDI() {
            if (document.getElementById('bank-pass').value !== BANK_PASSWORD) return alert("No Banca");
            await supabaseClient.from('system_data').update({ tdi_balance: tdiBalance + 2 }).eq('id', 1);
            addLogEntry(`[BANCA]: Registrata TDI (+2 BGC)`, 'text-green-400 font-bold');
        }

        async function createOfficialAct() {
            const id = document.getElementById('user-selector').value;
            const title = document.getElementById('contract-title').value;
            const p = players.find(x => x.id == id);
            
            if(p.balance < 2) return alert("Povero!");

            await supabaseClient.from('players').update({ balance: p.balance - 2 }).eq('id', id);
            await supabaseClient.from('system_data').update({ tdi_balance: tdiBalance + 2 }).eq('id', 1);
            await supabaseClient.from('contracts').insert([{ 
                title, 
                type: document.getElementById('contract-type').value, 
                members: document.getElementById('contract-members').value,
                creator_id: id 
            }]);
            
            addLogEntry(`[GAZZETTA]: Nuovo atto "${title}"`, 'text-blue-400');
        }

        // Avvio
        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
</html>
